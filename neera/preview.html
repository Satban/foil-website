<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neera — Preview (standalone)</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4EFE3;
    --cream: #FAF6EC;
    --brand: #C77966;
    --brand-dark: #A85B49;
    --text: #2A2520;
    --text-soft: #6B6258;
    --border: #E5DDD0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px 80px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px;
    box-shadow: 0 2px 10px rgba(42, 37, 32, 0.04);
  }
  .question-label {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.3;
    margin: 0 0 8px;
    color: var(--text);
  }
  .question-hint {
    font-size: 14px;
    color: var(--text-soft);
    margin: 0 0 20px;
  }
  .preview-row {
    display: flex;
    gap: 12px;
    margin: 20px auto 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .preview-row img {
    flex: 1 1 0;
    min-width: 0;
    max-width: 220px;
    height: auto;
    border-radius: 12px;
    display: block;
  }
  @media (max-width: 640px) {
    .preview-row {
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .preview-row img {
      max-width: 100%;
      width: 100%;
    }
  }
  .nav {
    margin-bottom: 16px;
    font-size: 13px;
  }
  .nav a {
    color: var(--brand-dark);
    text-decoration: none;
  }
  .nav a:hover { text-decoration: underline; }
  .breakpoint-note {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-soft);
  }
</style>
</head>
<body>
<div class="container">

<div class="nav"><a href="/neera/">← Back to survey</a> · <a href="/neera/mockups/">Mockups hub</a></div>

<div class="card">
  <div class="question-label">A look at what we're building</div>
  <div class="question-hint">Take a quick look at the three core surfaces. Continue when ready.</div>
  <div class="preview-row">
    <img src="assets/preview_chat.png" alt="Neera Chat surface — the primary conversation with the agent">
    <img src="assets/preview_plan.png" alt="Neera Plan surface — meals, groceries, calendar">
    <img src="assets/preview_insights.png" alt="Neera Insights surface — cardiometabolic fit score and macros">
  </div>
</div>

<div class="breakpoint-note">
  Layout: side-by-side ≥ 641px wide · stacked &lt; 641px wide. Resize the window to test.
</div>

</div>
</body>
</html>
