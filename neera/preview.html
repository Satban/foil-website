<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neera — Preview (standalone)</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4EFE3;
    --cream: #FAF6EC;
    --accent: #5A7A4F;
    --brand: #C77966;
    --brand-dark: #A85B49;
    --text: #2A2520;
    --text-soft: #6B6258;
    --border: #E5DDD0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px 80px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px;
    box-shadow: 0 2px 10px rgba(42, 37, 32, 0.04);
  }
  .preview-stack {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .preview-text, .preview-actions {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 22px;
    box-shadow: 0 2px 10px rgba(42, 37, 32, 0.04);
  }
  .preview-hero {
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 8px 0;
  }
  .question-label {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.3;
    margin: 0 0 8px;
    color: var(--text);
  }
  .question-hint {
    font-size: 14px;
    color: var(--text-soft);
    margin: 0 0 12px;
  }
  .carousel {
    margin: 24px auto 8px;
    max-width: 560px;
    width: 100%;
  }
  .carousel-frame {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .carousel-img-wrap {
    flex: 1;
    min-width: 0;
    display: flex;
    justify-content: center;
  }
  .carousel-img-wrap img {
    max-width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }
  .carousel-iframe-wrap {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    height: 760px;
    overflow: hidden;
  }
  .carousel-iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: var(--bg);
  }
  .carousel-arrow {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    padding: 0;
  }
  .carousel-arrow:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .carousel-arrow:disabled { opacity: 0.3; cursor: default; background: white; color: var(--text); border-color: var(--border); }
  .carousel-dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
    align-items: center;
  }
  .carousel-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    font-family: 'EB Garamond', serif;
    transition: all 0.15s;
  }
  .carousel-dot:hover { border-color: var(--accent); color: var(--accent); }
  .carousel-dot.active { background: var(--accent); color: white; border-color: var(--accent); }
  .carousel-counter {
    text-align: center;
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 8px;
    letter-spacing: 0.04em;
  }
  .nav {
    margin-bottom: 16px;
    font-size: 13px;
  }
  .nav a {
    color: var(--brand-dark);
    text-decoration: none;
  }
  .nav a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

<div class="nav"><a href="/neera/">← Back to survey</a> · <a href="/neera/mockups/">Mockups hub</a></div>

<div class="preview-stack">
  <div class="preview-text">
    <div class="question-label" style="margin:0 0 6px;">A look at what we're building</div>
    <div class="question-hint" style="margin:0;">Tap the arrows or numbers to see all four.</div>
  </div>
  <div class="preview-hero">
    <div class="carousel">
      <div class="carousel-frame">
        <button class="carousel-arrow" id="car-prev" aria-label="Previous">‹</button>
        <div class="carousel-img-wrap" id="car-stage">
          <img src="assets/preview_chat.png" alt="Chat — the primary conversation with the agent">
        </div>
        <button class="carousel-arrow" id="car-next" aria-label="Next">›</button>
      </div>
      <div class="carousel-dots">
        <button class="carousel-dot active" data-idx="0">1</button>
        <button class="carousel-dot" data-idx="1">2</button>
        <button class="carousel-dot" data-idx="2">3</button>
        <button class="carousel-dot" data-idx="3">4</button>
      </div>
      <div class="carousel-counter" id="car-counter">1 of 4 · Chat</div>
    </div>
  </div>
  <div class="preview-actions">
    <a href="/neera/" style="display:inline-block; color: var(--brand-dark); text-decoration: none; font-weight: 500;">← Back to survey</a>
  </div>
</div>

</div>
<script>
  const slides = [
    { type: 'img',    src: 'assets/preview_chat.png',     alt: 'Chat — the primary conversation with the agent',  label: 'Chat' },
    { type: 'img',    src: 'assets/preview_plan.png',     alt: 'Plan — meals, groceries, calendar',                label: 'Plan' },
    { type: 'img',    src: 'assets/preview_insights.png', alt: 'Insights — cardiometabolic fit score and macros',  label: 'Insights' },
    { type: 'iframe', src: 'mockups/interactive.html',    alt: 'Interactive prototype',                            label: 'interactive — play with it' },
  ];
  let idx = 0;
  const stageEl = document.getElementById('car-stage');
  const counterEl = document.getElementById('car-counter');
  const dots = document.querySelectorAll('.carousel-dot');
  const prevBtn = document.getElementById('car-prev');
  const nextBtn = document.getElementById('car-next');
  function goTo(i) {
    idx = Math.max(0, Math.min(slides.length - 1, i));
    const s = slides[idx];
    if (s.type === 'iframe') {
      stageEl.innerHTML = `<div class="carousel-iframe-wrap"><iframe src="${s.src}" title="${s.alt}" loading="lazy"></iframe></div>`;
    } else {
      stageEl.innerHTML = `<img src="${s.src}" alt="${s.alt}">`;
    }
    counterEl.textContent = `${idx + 1} of ${slides.length} · ${s.label}`;
    dots.forEach((d, di) => d.classList.toggle('active', di === idx));
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === slides.length - 1;
  }
  prevBtn.addEventListener('click', () => goTo(idx - 1));
  nextBtn.addEventListener('click', () => goTo(idx + 1));
  dots.forEach(d => d.addEventListener('click', () => goTo(parseInt(d.dataset.idx, 10))));
  goTo(0);
</script>
</body>
</html>
