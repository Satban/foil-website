<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting... | Foil</title>
  <script>
    // Handle dynamic routes for GitHub Pages
    // Redirects /club/CODE to /club/?code=CODE
    (function() {
      const path = window.location.pathname;

      // Handle /club/CODE pattern
      const clubMatch = path.match(/^\/club\/([A-Za-z0-9]+)\/?$/);
      if (clubMatch) {
        const code = clubMatch[1];
        window.location.replace('/club/?code=' + code);
        return;
      }

      // For other 404s, redirect to home
      window.location.replace('/');
    })();
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #FAF8F5;
      color: #1a1a1a;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #2e7d32;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirecting...</p>
  </div>
</body>
</html>
